name: Build and Release ZenNotes

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package Electron App
        # Standardized: Use '-- --publish always' to force .yml metadata generation 
        # for all operating systems.
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npm run package:win -- --publish always
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run package:mac -- --publish always
          else
            npm run package:linux -- --publish always
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts to Actions Tab
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}